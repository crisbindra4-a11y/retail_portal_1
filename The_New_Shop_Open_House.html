<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ready. Set. Retail.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    .rsr-root {
      background: #121212;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
      padding: 60px 24px 80px;
      box-sizing: border-box;
    }
    .rsr-watermark-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-35deg);
      font-size: 64px; font-weight: 900; letter-spacing: 0.15em;
      color: rgba(255,215,0,0.03);
      text-transform: uppercase;
      pointer-events: none; user-select: none; white-space: nowrap;
    }
    .rsr-header { text-align: center; margin-bottom: 56px; }
    .rsr-title {
      font-size: clamp(36px, 8vw, 72px); font-weight: 900;
      color: #FFD700; letter-spacing: 0.05em;
      text-transform: uppercase; line-height: 1; margin: 0 0 20px;
    }
    .rsr-subtitle {
      font-size: clamp(13px, 2.5vw, 17px); font-weight: 700;
      color: rgba(255,255,255,0.55); text-transform: uppercase;
      letter-spacing: 0.12em; max-width: 560px; margin: 0 auto; line-height: 1.6;
    }
    .rsr-divider { width: 60px; height: 3px; background: #FFD700; margin: 28px auto 0; border-radius: 2px; }
    .rsr-form { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; position: relative; z-index: 2; }
    
    .rsr-question { opacity: 0; transform: translateY(30px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .rsr-question.visible { opacity: 1; transform: translateY(0); }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .rsr-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,215,0,0.7); margin-bottom: 14px; display: block; }
    .rsr-q-text { font-size: clamp(20px, 4vw, 28px); font-weight: 900; color: #fff; margin-bottom: 18px; text-transform: uppercase; }

    .rsr-btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .rsr-choice, .rsr-toggle {
      background: transparent; border: 1.5px solid rgba(255,215,0,0.3);
      color: rgba(255,255,255,0.6); font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 14px 28px; cursor: pointer;
      border-radius: 4px; transition: all 0.2s ease;
    }
    .rsr-choice:hover, .rsr-toggle:hover { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.06); }
    .rsr-choice.selected, .rsr-toggle.selected { background: #FFD700; border-color: #FFD700; color: #121212; }

    .rsr-input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1.5px solid rgba(255,255,255,0.15);
      color: #fff; font-family: 'Inter', sans-serif; font-size: 18px;
      padding: 12px 0; outline: none; transition: border-color 0.2s ease;
    }
    .rsr-input:focus { border-bottom-color: #FFD700; }

    .rsr-submit {
      background: #FFD700; color: #121212; font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 900; letter-spacing: 0.18em;
      text-transform: uppercase; border: none; padding: 18px 48px;
      cursor: pointer; border-radius: 4px; transition: transform 0.18s ease;
    }
    .rsr-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .rsr-error { color: #ff6b6b; font-size: 13px; font-weight: 700; margin-top: 12px; display: none; text-transform: uppercase; }
    .rsr-success { display: none; text-align: center; padding: 60px 0; }
    .rsr-success-text { font-size: 42px; font-weight: 900; color: #FFD700; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="rsr-root">
  <div class="rsr-watermark-center">THE NEW SHOP</div>

  <div class="rsr-header">
    <h1 class="rsr-title">Ready. Set. Retail.</h1>
    <p class="rsr-subtitle">The VIP entrance to the retail game.</p>
    <div class="rsr-divider"></div>
  </div>

  <div class="rsr-form" id="rsr-form">
    <div class="rsr-question" data-q="1">
      <span class="rsr-label">01 / 04</span>
      <p class="rsr-q-text">Are You Coming?</p>
      <div class="rsr-btn-group">
        <button type="button" class="rsr-choice" onclick="selectValue('coming', 'Yes', this)">Yes</button>
        <button type="button" class="rsr-choice" onclick="selectValue('coming', 'No', this)">No</button>
      </div>
    </div>

    <div class="rsr-question" data-q="2">
      <span class="rsr-label">02 / 04</span>
      <p class="rsr-q-text">Your Name</p>
      <input id="field-name" class="rsr-input" type="text" placeholder="First & last name" autocomplete="off" />
    </div>

    <div class="rsr-question" data-q="3">
      <span class="rsr-label">03 / 04</span>
      <p class="rsr-q-text">Company Name</p>
      <input id="field-company" class="rsr-input" type="text" placeholder="Your brand or company" autocomplete="off" />
    </div>

    <div class="rsr-question" data-q="4">
      <span class="rsr-label">04 / 04</span>
      <p class="rsr-q-text">Category</p>
      <div class="rsr-btn-group">
        <button type="button" class="rsr-toggle" onclick="selectValue('cat', 'Food', this)">Food</button>
        <button type="button" class="rsr-toggle" onclick="selectValue('cat', 'Non-Food', this)">Non-Food</button>
      </div>
    </div>

    <div class="rsr-question">
      <button class="rsr-submit" id="submit-btn" onclick="handleSubmit()">Plug In →</button>
      <p class="rsr-error" id="rsr-error"></p>
    </div>
  </div>

  <div class="rsr-success" id="rsr-success">
    <p class="rsr-success-text">You're In.</p>
    <p class="rsr-success-sub">Welcome to the shelf. We'll be in touch.</p>
  </div>
</div>

<script>
  // YOUR LIVE LINK IS NOW PERMANENTLY INJECTED BELOW
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzBFkFmAHrF7AByS04Zn9U-xyCL3WU54KcRVVSndjr5e6W1rB9vRapNlb5921zgfT1ZkA/exec";

  const selections = { coming: null, cat: null };

  function selectValue(group, val, btn) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selections[group] = val;
    document.getElementById('rsr-error').style.display = 'none';
  }

  function triggerError(msg) {
    const el = document.getElementById('rsr-error');
    el.textContent = msg;
    el.style.display = 'block';
    const form = document.getElementById('rsr-form');
    form.style.animation = "shake 0.4s ease";
    setTimeout(() => form.style.animation = "", 400);
  }

  async function handleSubmit() {
    const name = document.getElementById('field-name').value.trim();
    const company = document.getElementById('field-company').value.trim();
    const btn = document.getElementById('submit-btn');

    if (!selections.coming) return triggerError("Select attendance status.");
    if (!name) return triggerError("Name is required.");
    if (!company) return triggerError("Company name is required.");
    if (!selections.cat) return triggerError("Select a category.");

    btn.disabled = true;
    btn.textContent = "SENDING...";

    const payload = { 
      name: name, 
      company: company, 
      category: selections.cat, 
      coming: selections.coming 
    };

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      });

      // Show success screen
      document.getElementById('rsr-form').style.display = 'none';
      document.getElementById('rsr-success').style.display = 'block';
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Plug In →";
      triggerError("Something went wrong. Try again.");
    }
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.rsr-question').forEach(q => observer.observe(q));
</script>

</body>
</html>
